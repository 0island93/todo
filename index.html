<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO 앱</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 520px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #5c6bc0;
    }

    .input-row button {
      padding: 12px 20px;
      background: #5c6bc0;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3f51b5;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: white;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #555;
    }

    .filters button.active {
      border-color: #5c6bc0;
      background: #5c6bc0;
      color: white;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #5c6bc0;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 1rem;
      color: #333;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e53935;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 0.85rem;
    }

    .clear-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #ffcdd2;
      border-radius: 10px;
      color: #e53935;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: #ffebee;
    }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#x2705; TODO</h1>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="할 일을 입력하세요..." maxlength="100">
      <button onclick="addTodo()">추가</button>
    </div>

    <div class="filters">
      <button onclick="setFilter('all')" id="filter-all" class="active">전체</button>
      <button onclick="setFilter('active')" id="filter-active">미완료</button>
      <button onclick="setFilter('done')" id="filter-done">완료</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer" id="footer"></div>

    <button class="clear-btn" onclick="clearDone()">완료된 항목 모두 삭제</button>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function render() {
      const list = document.getElementById('todoList');
      const footer = document.getElementById('footer');

      const filtered = todos.filter(function(t) {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">할 일이 없습니다.</div>';
      } else {
        list.innerHTML = filtered.map(function(t) {
          return '<li class="todo-item ' + (t.done ? 'done' : '') + '" data-id="' + t.id + '">'
            + '<input type="checkbox" ' + (t.done ? 'checked' : '') + ' onchange="toggle(' + t.id + ')">'
            + '<span class="todo-text">' + escapeHtml(t.text) + '</span>'
            + '<button class="delete-btn" onclick="deleteTodo(' + t.id + ')">&#215;</button>'
            + '</li>';
        }).join('');
      }

      const remaining = todos.filter(function(t) { return !t.done; }).length;
      footer.textContent = '남은 할 일: ' + remaining + '개 / 전체: ' + todos.length + '개';

      ['all', 'active', 'done'].forEach(function(f) {
        document.getElementById('filter-' + f).classList.toggle('active', f === filter);
      });
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      todos.unshift({ id: Date.now(), text: text, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(id) {
      const todo = todos.find(function(t) { return t.id === id; });
      if (todo) todo.done = !todo.done;
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(function(t) { return t.id !== id; });
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(function(t) { return !t.done; });
      save();
      render();
    }

    function setFilter(f) {
      filter = f;
      render();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.getElementById('todoInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
